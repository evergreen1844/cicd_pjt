stages:
  - build

variables:
  IMAGE_NAME: "harbor.internal/library/cicd-app"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  DOCKER_CONFIG: "/kaniko/.docker"

build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:latest
    entrypoint: ["/kaniko/executor"]
  script:
    # Kaniko Docker auth (Harbor 로그인)
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"harbor.internal\":{\"username\":\"$HARBOR_USER\",\"password\":\"$HARBOR_PASSWORD\"}}}" > /kaniko/.docker/config.json

    # 이미지 빌드 + Push
    - /kaniko/executor \
        --context $CI_PROJECT_DIR \
        --dockerfile $CI_PROJECT_DIR/Dockerfile \
        --destination $IMAGE_NAME:$IMAGE_TAG \
        --insecure \
        --skip-tls-verify
  only:
    - main

