# app/.gitlab-ci.yml
stages:
  - build

variables:
  IMAGE_NAME: "harbor.internal/library/cicd-app"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  DOCKER_CONFIG: "/kaniko/.docker"

build:
  stage: build
  image:
    name: harbor.internal/library/kaniko-executor:v1.12.0
    entrypoint: ["/kaniko/executor"] # 중요한 설정, shell 없이 executor 직접 실행
  script:
    # Kaniko Docker auth
    - mkdir -p $DOCKER_CONFIG
    - echo "{\"auths\":{\"harbor.internal\":{\"username\":\"$HARBOR_USER\",\"password\":\"$HARBOR_PASSWORD\"}}}" > $DOCKER_CONFIG/config.json

    # Kaniko로 Docker 이미지 빌드 + push
    - /kaniko/executor \
        --context $CI_PROJECT_DIR \
        --dockerfile $CI_PROJECT_DIR/Dockerfile \
        --destination $IMAGE_NAME:$IMAGE_TAG \
        --insecure \
        --skip-tls-verify

  only:
    - main

